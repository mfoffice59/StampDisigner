name: Build Stamp Designer Pro

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
      - develop

jobs:
  build-windows:
    name: Windows x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Publish Windows
        run: dotnet publish src/StampDesignerPro/StampDesignerPro.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:EnableCompressionInSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o release/windows-x64
      - name: Copy libraries
        shell: pwsh
        run: |
          if (Test-Path "Libraries") { Copy-Item -Recurse -Force "Libraries" "release/windows-x64/Libraries" }
      - name: Package Windows
        shell: pwsh
        run: Compress-Archive -Path release/windows-x64/* -DestinationPath StampDesignerPro-Windows-x64.zip
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: StampDesignerPro-Windows-x64
          path: StampDesignerPro-Windows-x64.zip

  build-macos-arm64:
    name: macOS Apple Silicon
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Publish macOS arm64
        run: dotnet publish src/StampDesignerPro/StampDesignerPro.csproj -c Release -r osx-arm64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o release/osx-arm64
      - name: Create app bundle
        run: |
          APP="Stamp Designer Pro.app"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources/osx-arm64"
          cp -R release/osx-arm64/* "$APP/Contents/Resources/osx-arm64/"
          cat > "$APP/Contents/Info.plist" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "https://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict><key>CFBundleName</key><string>Stamp Designer Pro</string><key>CFBundleIdentifier</key><string>com.stampdesigner.pro</string><key>CFBundleExecutable</key><string>StampDesignerLauncher</string><key>CFBundlePackageType</key><string>APPL</string><key>NSHighResolutionCapable</key><true/></dict></plist>
          PLIST
          cat > "$APP/Contents/MacOS/StampDesignerLauncher" <<'LAUNCHER'
          #!/bin/bash
          APPDIR="$(cd "$(dirname "$0")/.." && pwd)"
          exec "$APPDIR/Resources/osx-arm64/StampDesignerPro"
          LAUNCHER
          chmod +x "$APP/Contents/MacOS/StampDesignerLauncher" "$APP/Contents/Resources/osx-arm64/StampDesignerPro"
          zip -r StampDesignerPro-macOS-arm64.zip "$APP"
      - name: Upload macOS arm64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: StampDesignerPro-macOS-arm64
          path: StampDesignerPro-macOS-arm64.zip

  build-macos-x64:
    name: macOS Intel
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Publish macOS x64
        run: dotnet publish src/StampDesignerPro/StampDesignerPro.csproj -c Release -r osx-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o release/osx-x64
      - name: Create app bundle
        run: |
          APP="Stamp Designer Pro.app"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources/osx-x64"
          cp -R release/osx-x64/* "$APP/Contents/Resources/osx-x64/"
          cat > "$APP/Contents/Info.plist" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "https://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict><key>CFBundleName</key><string>Stamp Designer Pro</string><key>CFBundleIdentifier</key><string>com.stampdesigner.pro</string><key>CFBundleExecutable</key><string>StampDesignerLauncher</string><key>CFBundlePackageType</key><string>APPL</string><key>NSHighResolutionCapable</key><true/></dict></plist>
          PLIST
          cat > "$APP/Contents/MacOS/StampDesignerLauncher" <<'LAUNCHER'
          #!/bin/bash
          APPDIR="$(cd "$(dirname "$0")/.." && pwd)"
          exec "$APPDIR/Resources/osx-x64/StampDesignerPro"
          LAUNCHER
          chmod +x "$APP/Contents/MacOS/StampDesignerLauncher" "$APP/Contents/Resources/osx-x64/StampDesignerPro"
          zip -r StampDesignerPro-macOS-x64.zip "$APP"
      - name: Upload macOS x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: StampDesignerPro-macOS-x64
          path: StampDesignerPro-macOS-x64.zip
